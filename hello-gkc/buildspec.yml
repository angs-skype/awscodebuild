version: 0.2

env:
  variables:
    AWS_REGION: us-east-1
    ECR_REPO: spring-demo
    CLUSTER_NAME: spring-eks-cluster

phases:
  install:
    runtime-versions:
      java: corretto17
    commands:
      - echo Installing kubectl
      - curl -LO "https://dl.k8s.io/release/v1.29.0/bin/linux/amd64/kubectl"
      - chmod +x kubectl
      - mv kubectl /usr/local/bin/
      - kubectl version --client

  pre_build:
    commands:
      - echo Getting AWS account ID
      - ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)

      - echo Logging in to ECR
      - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com

      - echo Ensuring ECR repository exists
      - aws ecr describe-repositories --repository-names $ECR_REPO --region $AWS_REGION || aws ecr create-repository --repository-name $ECR_REPO --region $AWS_REGION

  build:
    commands:
      - echo Build Spring Boot app
      - cd hello-gkc
      - mvn clean package

      - echo Build Docker image
      - docker build -t $ECR_REPO .

      - echo Tag Docker image
      - docker tag $ECR_REPO:latest $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPO:latest

  post_build:
    commands:
      - echo Pushing Docker image to ECR
      - docker push $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPO:latest

      - echo Updating kubeconfig
      - aws eks update-kubeconfig --region $AWS_REGION --name $CLUSTER_NAME

      - echo Deploying to EKS
      - kubectl apply -f k8s/deployment.yaml
      - kubectl apply -f k8s/service.yaml

artifacts:
  files:
    - '**/*'